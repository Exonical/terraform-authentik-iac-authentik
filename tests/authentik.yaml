---
authentik:
  system:
    system_settings:
      avatars: "gravatar,initials"
      default_user_change_name: false
      default_user_change_email: true
      default_user_change_username: true
      event_retention: "days=365"
      gdpr_compliance: false
      impersonation: false
      default_token_duration: "hours=1"
      default_token_length: 128
      footer_links:
        - name: "Support"
          href: "https://support.example.com"
        - name: "Documentation"
          href: "https://docs.example.com"
      reputation_lower_limit: -10
      reputation_upper_limit: 10
      pagination_default_page_size: 25
      pagination_max_page_size: 200
      flags: '{"flows_refresh_others":false,"policies_buffered_access_view":true}'
    certificate_key_pairs:
      - name: "test-cert"
        certificate_data: !env TEST_CERT_PEM
        key_data: !env TEST_KEY_PEM
    service_connections:
      docker:
        - name: "test-local-docker"
          local: true
    brands:
      - domain: "test.example.com"
        default: false
        branding_title: "Test Brand"
  applications:
    providers:
      oauth2:
        - name: "test-oauth2-provider"
          client_id: "test-client-id"
          authorization_flow: "default-provider-authorization-implicit-consent"
          invalidation_flow: "default-provider-invalidation-flow"
          allowed_redirect_uris:
            - matching_mode: "strict"
              url: "http://localhost:8080/callback"
    applications:
      - name: "Test Application"
        slug: "test-application"
        provider: "test-oauth2-provider"
        group: "Testing"
  flows_and_stages:
    stages:
      identification:
        - name: "test-identification-stage"
          user_fields:
            - "username"
            - "email"
      password:
        - name: "test-password-stage"
          backends:
            - "authentik.core.auth.InbuiltBackend"
      user_login:
        - name: "test-user-login-stage"
    flows:
      - name: "Test Login Flow"
        slug: "test-login-flow"
        title: "Test Login"
        designation: "authentication"
        stage_bindings:
          - stage: "test-identification-stage"
            order: 10
          - stage: "test-password-stage"
            order: 20
          - stage: "test-user-login-stage"
            order: 30
  customization:
    policies:
      expression:
        - name: "test-expression-policy"
          expression: "return True"
  events:
    transports:
      - name: "test-email-transport"
        mode: "email"
  rbac:
    roles:
      - name: "test-role"
  endpoint_devices:
    device_access_groups:
      - name: "test-device-access-group"
  directory:
    groups:
      - name: "test-group"
    users:
      - username: "test-user"
        name: "Test User"
        email: "test@example.com"

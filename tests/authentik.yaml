---
authentik:
  system:
    system_settings:
      default_user_change_username: true
      event_retention: "days=365"
    brands:
      - domain: "test.example.com"
        default: false
        branding_title: "Test Brand"
  applications:
    providers:
      oauth2:
        - name: "test-oauth2-provider"
          client_id: "test-client-id"
          authorization_flow: "default-provider-authorization-implicit-consent"
          invalidation_flow: "default-provider-invalidation-flow"
          allowed_redirect_uris:
            - matching_mode: "strict"
              url: "http://localhost:8080/callback"
    applications:
      - name: "Test Application"
        slug: "test-application"
        provider: "test-oauth2-provider"
        group: "Testing"
  flows_and_stages:
    stages:
      identification:
        - name: "test-identification-stage"
          user_fields:
            - "username"
            - "email"
      password:
        - name: "test-password-stage"
          backends:
            - "authentik.core.auth.InbuiltBackend"
      user_login:
        - name: "test-user-login-stage"
    flows:
      - name: "Test Login Flow"
        slug: "test-login-flow"
        title: "Test Login"
        designation: "authentication"
        stage_bindings:
          - stage: "test-identification-stage"
            order: 10
          - stage: "test-password-stage"
            order: 20
          - stage: "test-user-login-stage"
            order: 30
  rbac:
    roles:
      - name: "test-role"
  endpoint_devices:
    device_access_groups:
      - name: "test-device-access-group"
  directory:
    groups:
      - name: "test-group"
    users:
      - username: "test-user"
        name: "Test User"
        email: "test@example.com"
